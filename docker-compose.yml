version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cmms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    volumes:
      - ./private-uploads:/app/private-uploads
    environment:
      # We pass these through using the ${VAR} syntax so Docker knows 
      # to pull the real values from your xCloud Environment Variables dashboard.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cmms?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      MEDICAL_ENCRYPTION_KEY: ${MEDICAL_ENCRYPTION_KEY}
      SEED_SUPER_ADMIN_NAME: ${SEED_SUPER_ADMIN_NAME}
      SEED_SUPER_ADMIN_EMAIL: ${SEED_SUPER_ADMIN_EMAIL}
      SEED_SUPER_ADMIN_PASSWORD: ${SEED_SUPER_ADMIN_PASSWORD}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      # This ensures Next.js listens publicly so Nginx can reach it
      HOSTNAME: "0.0.0.0" 

volumes:
  postgres_data:
